<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours de Noah 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #fef9f0; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #2ecc71, #3498db, #8e44ad);
    padding: 30px 20px; text-align: center;
  }
  header h1 { font-family: 'Baloo 2', cursive; font-size: 2.2rem; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
  header p { color: rgba(255,255,255,0.9); margin-top: 6px; font-size: 1.1rem; }

  .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }

  .matiere-title {
    font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 800;
    margin: 28px 0 14px; display: flex; align-items: center; gap: 10px;
    color: #2c3e50; border-bottom: 3px solid #eee; padding-bottom: 8px;
  }

  .cours-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

  .cours-card {
    display: block; text-decoration: none;
    border-radius: 16px; padding: 20px 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
    color: #fff;
  }
  .cours-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
  .cours-card .emoji { font-size: 2rem; display: block; margin-bottom: 10px; }
  .cours-card .titre { font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800; line-height: 1.3; }
  .cours-card .niveau { font-size: 0.8rem; opacity: 0.85; margin-top: 6px; }

  .svt { background: linear-gradient(135deg, #2ecc71, #27ae60); }
  .maths { background: linear-gradient(135deg, #3498db, #2980b9); }
  .physique { background: linear-gradient(135deg, #e67e22, #d35400); }
  .histoire { background: linear-gradient(135deg, #8e44ad, #6c3483); }

  footer { text-align: center; padding: 30px; color: #aaa; font-size: 0.85rem; margin-top: 20px; }
</style>
</head>
<body>

<header>
  <div style="font-size:2rem;margin-bottom:8px;">📚 🎓 ✏️</div>
  <h1>Cours de Noah</h1>
  <p>4e – Clique sur un cours pour l'ouvrir !</p>
</header>

<div class="container">

  <div class="matiere-title">🌿 SVT</div>
  <div class="cours-grid">
    <a class="cours-card svt" href="risques-sismiques/index.html">
      <span class="emoji">🌋</span>
      <div class="titre">Risques sismiques et volcaniques</div>
      <div class="niveau">SVT · 4e</div>
    </a>
    <a class="cours-card svt" href="reproduction/reproduction.html">
      <span class="emoji">🧬</span>
      <div class="titre">Reproduction & Contraception</div>
      <div class="niveau">SVT · 4e</div>
    </a>
  </div>

  <div class="matiere-title">➕ Maths</div>
  <div class="cours-grid">
    <!-- Cours maths à venir -->
    <div style="color:#bbb;font-style:italic;padding:10px;">Bientôt disponible...</div>
  </div>

  <div class="matiere-title">⚡ Physique-Chimie</div>
  <div class="cours-grid">
    <div style="color:#bbb;font-style:italic;padding:10px;">Bientôt disponible...</div>
  </div>

</div>

<footer>Créé avec ❤️ pour Noah</footer>

</body>
</html>
